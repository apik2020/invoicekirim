# Docker Compose for local development
# Run: docker-compose up -d
#
# Production uses Cloudflare R2 (no local storage service needed)
# Only use this for local development with optional MinIO

services:
  # MinIO for LOCAL DEVELOPMENT only (optional)
  # Production uses Cloudflare R2
  minio:
    image: minio/minio:latest
    container_name: notabener-minio
    ports:
      - "9000:9000"   # API port
      - "9001:9001"   # Console port
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin123
      MINIO_DEFAULT_BUCKETS: notabener
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    restart: unless-stopped
    profiles:
      - local-dev

  minio-create-bucket:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_started
    entrypoint: >
      /bin/sh -c "
      sleep 3;
      mc alias set myminio http://minio:9000 minioadmin minioadmin123;
      mc mb myminio/notabener --ignore-existing;
      mc anonymous set download myminio/notabener;
      exit 0;
      "
    profiles:
      - local-dev

volumes:
  minio_data:

# ============================================
# Production: Cloudflare R2 Configuration
# ============================================
# STORAGE_TYPE=s3
# S3_ENDPOINT=https://<account-id>.r2.cloudflarestorage.com
# S3_ACCESS_KEY=<your-r2-access-key>
# S3_SECRET_KEY=<your-r2-secret-key>
# S3_BUCKET=notabener
# S3_REGION=auto
# S3_PUBLIC_URL=https://cdn.yourdomain.com
#
# Setup steps:
# 1. Create R2 bucket in Cloudflare Dashboard
# 2. Create R2 API Token (Object Read/Write permission)
# 3. Enable R2.dev subdomain OR connect custom domain
# 4. Add env vars above to Dokploy

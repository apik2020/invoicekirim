# Docker Compose for local development with RustFS (S3-compatible storage)
# Alternative to MinIO - lighter, Rust-based, Apache 2.0 license
# Run: docker-compose up -d
#
# RustFS Console: http://localhost:7001
# S3 API: http://localhost:9000

services:
  rustfs:
    image: rustfs/rustfs:latest
    container_name: notabener-rustfs
    ports:
      - "9000:9000"   # S3 API port
      - "7001:7001"   # Console UI port
    environment:
      RUSTFS_ACCESS_KEY: notabener-admin
      RUSTFS_SECRET_KEY: notabener-secret-123
      RUSTFS_ADDRESS: ":9000"
      RUSTFS_CONSOLE_ENABLE: "true"
      RUSTFS_CONSOLE_ADDRESS: ":7001"
    volumes:
      - rustfs_data:/data
    restart: unless-stopped

  # Create bucket and set public access on startup
  rustfs-init:
    image: minio/mc:latest
    depends_on:
      - rustfs
    entrypoint: >
      /bin/sh -c "
      echo 'Waiting for RustFS to be ready...';
      sleep 5;
      mc alias set notabener http://rustfs:9000 notabener-admin notabener-secret-123;
      mc mb notabener/notabener --ignore-existing;
      mc anonymous set download notabener/notabener;
      echo 'Bucket created and set to public read access.';
      exit 0;
      "

volumes:
  rustfs_data:

# ============================================
# Development Environment Variables for .env.local
# ============================================
# Add these to your .env.local when using RustFS locally:
#
# STORAGE_TYPE=s3
# S3_ENDPOINT=http://localhost:9000
# S3_ACCESS_KEY=notabener-admin
# S3_SECRET_KEY=notabener-secret-123
# S3_BUCKET=notabener
# S3_REGION=us-east-1
# S3_PUBLIC_URL=http://localhost:9000/notabener
#
# RustFS Console: http://localhost:7001
# Username: notabener-admin
# Password: notabener-secret-123

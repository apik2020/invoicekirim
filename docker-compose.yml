# Docker Compose for local development with MinIO (S3-compatible storage)
# Run: docker-compose up -d

services:
  minio:
    image: minio/minio:latest
    container_name: notabener-minio
    ports:
      - "9000:9000"   # API port
      - "9001:9001"   # Console port
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin123
      MINIO_DEFAULT_BUCKETS: notabener
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3
    restart: unless-stopped

  # Optional: Create buckets on startup
  minio-create-bucket:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set myminio http://minio:9000 minioadmin minioadmin123;
      mc mb myminio/notabener --ignore-existing;
      mc anonymous set download myminio/notabener;
      exit 0;
      "

volumes:
  minio_data:

# ============================================
# Development Environment Variables for .env.local
# ============================================
# Add these to your .env.local when using MinIO locally:
#
# STORAGE_TYPE=s3
# S3_ENDPOINT=http://localhost:9000
# S3_ACCESS_KEY=minioadmin
# S3_SECRET_KEY=minioadmin123
# S3_BUCKET=notabener
# S3_REGION=us-east-1
# S3_PUBLIC_URL=http://localhost:9000/notabener
#
# MinIO Console: http://localhost:9001
# Username: minioadmin
# Password: minioadmin123
